name: Firebase 자동 배포

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 5 28 6 *'  # 6월 28일 05:00 UTC = 14:00 KST
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Bump SW cache version
        run: |
          node -e "
            const fs=require('fs');
            const f='sw.js';
            const s=fs.readFileSync(f,'utf8');
            fs.writeFileSync(f,s.replace(/wc2026-v[0-9A-Za-z-]+/,'wc2026-v'+Date.now()));
            console.log('SW cache version bumped');
          "

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project ske-0004
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
