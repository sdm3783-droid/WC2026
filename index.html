<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WC2026 예측방 - 서비스 종료</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0d1b2a;
    color: #f1f5f9;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
  }
  .wrap {
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    box-sizing: border-box;
    text-align: center;
  }
  .card {
    max-width: 420px;
  }
  .card .trophy { font-size: 48px; margin-bottom: 16px; }
  .card h1 { font-size: 22px; margin: 0 0 12px; }
  .card p { font-size: 15px; line-height: 1.6; color: #cbd5e1; margin: 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="trophy">🏆</div>
    <h1>WC2026 예측방 서비스가 종료되었습니다</h1>
    <p>월드컵이 마무리되면서 서비스를 종료했습니다.<br>그동안 함께해주셔서 감사합니다.</p>
  </div>
</div>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister()));
  }
  if ('caches' in window) {
    caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
  }
</script>
</body>
</html>
